engine: godot
default_roles:
  - godot-specialist
  - gameplay-programmer
  - tools-programmer
required_checks:
  - "Run the project import check."
  - "Confirm the pinned Godot version before using version-sensitive APIs."
  - "Confirm the main scene and input actions before first-playable claims."
  - "Identify the reference pattern used, or state why no reference pattern was needed."
  - "Run scene smoke checks."
  - "Capture at least one playable visual artifact before claiming game feel."
notes:
  - "Use scenes and resources as authoring units."
  - "Prefer typed GDScript for gameplay and UI unless C# or GDExtension is justified."
  - "Use custom Resource files for reusable game data and tuning values."
  - "List exported tuning values that affect feel, balance, camera, or feedback."
  - "Treat camera, input, collision, animation, audio, and UI feedback as one player-facing chain."
  - "Use signals across ownership boundaries; avoid global autoloads for ordinary scene state."
  - "Do not claim deterministic physics outcomes; bound and observe them."
  - "Keep gameplay authority separate from presentation when the design requires it."
adoption_checks:
  - "Infer systems from scenes, scripts, autoloads, input actions, resources, tests, and export presets."
  - "Separate existing runnable behavior from missing production records."
  - "For builder or save/load work, require a resource or file round-trip check."
  - "For input-heavy work, record keyboard, mouse, and gamepad support actually checked."
  - "For public demo work, check accessibility and localization risks when UI or text is central."
runtime_check_ladder:
  - "import check"
  - "script check"
  - "scene load check"
  - "smoke run"
  - "gameplay capture"
  - "playtest note"
  - "export check"
